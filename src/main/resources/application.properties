server.port=${PORT:8080}

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/xinai_inventory?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath*:com/xinai/inventory/dao/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.com.xinai.inventory=DEBUG