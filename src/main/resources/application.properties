server.port=${PORT:8080}

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/xinai_inventory}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath*:com/xinai/inventory/dao/*.xml
mybatis.config-location=classpath:mybatis-config.xml

logging.level.com.xinai.inventory=DEBUG