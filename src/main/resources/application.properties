server.port=${PORT:8080}

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:xinai_inventory}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath*:com/xinai/inventory/dao/*.xml
mybatis.config-location=classpath:mybatis-config.xml

logging.level.com.xinai.inventory=DEBUG